<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Difficulty Validator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Set theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("sdv-theme");
        if (t === "dark") document.documentElement.classList.add("dark");
      } catch (e) {}
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["IBM Plex Sans", "system-ui", "sans-serif"],
            mono: ["IBM Plex Mono", "ui-monospace", "monospace"],
          },
          colors: {
            canvas: { light: "#f5f7fa", dark: "#0a0f1a" },
            accent: {
              50: "#f0fdfa", 100: "#ccfbf1", 200: "#99f6e4", 300: "#5eead4",
              400: "#2dd4bf", 500: "#14b8a6", 600: "#0d9488", 700: "#0f766e",
              800: "#115e59", 900: "#134e4a",
            },
          },
          boxShadow: {
            card: "0 1px 2px 0 rgba(15,23,42,0.04), 0 1px 3px 0 rgba(15,23,42,0.06)",
            cardlg: "0 4px 16px -4px rgba(15,23,42,0.10), 0 2px 6px -2px rgba(15,23,42,0.06)",
          },
        },
      },
    };
  </script>

  <style>
    html, body { height: 100%; }
    body { background: #f5f7fa; }
    html.dark body { background: #0a0f1a; }
    * { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    ::selection { background: rgba(13,148,136,0.22); }
    .tnum { font-variant-numeric: tabular-nums; }
    /* slim scrollbars */
    .thin-scroll::-webkit-scrollbar { height: 9px; width: 9px; }
    .thin-scroll::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.35); border-radius: 99px; }
    .thin-scroll::-webkit-scrollbar-track { background: transparent; }
    @keyframes sdv-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .animate-fade { animation: sdv-fade 0.32s cubic-bezier(0.22,1,0.36,1) both; }
  </style>
</head>
<body class="font-sans text-slate-900 dark:text-slate-100 antialiased">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Engine + data: Choose ONE option below -->

  <!-- OPTION 1: Local JavaScript (no backend required) -->
  <!-- <script src="js/solver.js"></script> -->
  <!-- <script src="js/data.js"></script> -->

  <!-- OPTION 2: Python Backend API (requires backend running on localhost:8000) -->
  <script src="js/api-adapter.js"></script>

  <!-- UI (JSX, transpiled by Babel) -->
  <script type="text/babel" src="js/components.jsx"></script>
  <script type="text/babel" src="js/user-context.jsx"></script>
  <script type="text/babel" src="js/email-prompt.jsx"></script>
  <script type="text/babel" src="js/charts.jsx"></script>
  <script type="text/babel" src="js/submit.jsx"></script>
  <script type="text/babel" src="js/repository.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#0d9488"/>
      <g fill="none" stroke="#ffffff" stroke-width="2">
        <rect x="30" y="30" width="40" height="40"/>
        <line x1="43.3" y1="30" x2="43.3" y2="70"/>
        <line x1="56.6" y1="30" x2="56.6" y2="70"/>
        <line x1="30" y1="43.3" x2="70" y2="43.3"/>
        <line x1="30" y1="56.6" x2="70" y2="56.6"/>
      </g>
    </svg>
  </template>
</body>
</html>
